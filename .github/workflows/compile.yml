name: Compile content.json

on:
  push:
    branches: [main]
    paths:
      - 'articles/**/*.md'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile articles to content.json
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          function parseFrontmatter(content) {
            const match = content.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
            if (!match) return null;
            const frontmatter = {};
            match[1].split('\n').forEach(line => {
              const colonIdx = line.indexOf(':');
              if (colonIdx === -1) return;
              const key = line.slice(0, colonIdx).trim();
              const value = line.slice(colonIdx + 1).trim();
              if (value.startsWith('[') || value === '') {
                // handle inline arrays or skip (multi-line handled below)
                if (value.startsWith('[')) {
                  frontmatter[key] = JSON.parse(value.replace(/'/g, '\"'));
                }
              } else {
                frontmatter[key] = value.replace(/^\"|\"$/g, '').replace(/^'|'$/g, '');
              }
            });
            // parse list items
            let currentKey = null;
            match[1].split('\n').forEach(line => {
              if (/^[a-zA-Z]/.test(line) && line.includes(':')) {
                const colonIdx = line.indexOf(':');
                currentKey = line.slice(0, colonIdx).trim();
                const value = line.slice(colonIdx + 1).trim();
                if (!value) frontmatter[currentKey] = [];
              } else if (line.trim().startsWith('- ') && currentKey) {
                if (!Array.isArray(frontmatter[currentKey])) frontmatter[currentKey] = [];
                frontmatter[currentKey].push(line.trim().slice(2));
              }
            });
            return { frontmatter, body: match[2].trim() };
          }

          function walk(dir) {
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) results.push(...walk(fullPath));
              else if (entry.name.endsWith('.md')) results.push(fullPath);
            }
            return results;
          }

          const files = walk('articles');
          const articles = [];

          for (const file of files) {
            const content = fs.readFileSync(file, 'utf8');
            const parsed = parseFrontmatter(content);
            if (!parsed) { console.warn('Skipping', file, '(no frontmatter)'); continue; }
            const { frontmatter, body } = parsed;
            if (!frontmatter.slug || !frontmatter.title) { console.warn('Skipping', file, '(missing slug or title)'); continue; }
            articles.push({
              slug: frontmatter.slug,
              title: frontmatter.title,
              summary: frontmatter.summary || '',
              body,
              tags: frontmatter.tags || [],
              relatedChallengeTypes: frontmatter.relatedChallengeTypes || [],
              imageUrl: frontmatter.imageUrl || null,
              publishedAt: frontmatter.publishedAt || '',
            });
          }

          articles.sort((a, b) => b.publishedAt.localeCompare(a.publishedAt));
          fs.writeFileSync('content.json', JSON.stringify({ articles }, null, 2));
          console.log('Compiled', articles.length, 'articles to content.json');
          "

      - name: Commit content.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content.json
          git diff --staged --quiet || git commit -m "chore: recompile content.json [skip ci]"
          git push
